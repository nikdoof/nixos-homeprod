# statix configuration
# https://github.com/oppiliappan/statix#configuration

# W20 (repeated_keys / dotted-path assignments) is disabled globally.
# Dotted-path style (networking.hostName = ...; networking.domain = ...;)
# is idiomatic in NixOS configurations and should not be flagged.
disabled = ["repeated_keys"]

ignore = [
  # dns.nix zone files use repeated `subdomains` keys by design
  "modules/doofnet/bind/zones",
  # hardware-configuration.nix files are auto-generated by nixos-generate-config
  # and should never be manually reformatted
  "hosts/*/hardware-configuration.nix",
  # microvms.nix uses a let binding to extract a deeply-nested attribute path
  # (inputs.self.nixosConfigurations.${name}.config.doofnet.microvm.cid) which
  # statix W04 incorrectly flags as "should use inherit". inherit is not
  # applicable here as the RHS is not a local name.
  "hosts/hyp-01/microvms.nix",
]
